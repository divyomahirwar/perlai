<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  background: #f4f7ff;
  color: #0f172a;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.logo {
  font-weight: 700;
  font-size: 18px;
  color: #1e40af;
}

.badge {
  background: #e0f2fe;
  color: #0284c7;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
}

/* HERO */
.hero {
  text-align: center;
  margin-bottom: 40px;
}

.hero h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.hero p {
  color: #64748b;
}

/* STATS */
.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 25px;
  flex-wrap: wrap;
}

.stat {
  background: white;
  padding: 15px 25px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  text-align: center;
}

.stat h3 {
  color: #2563eb;
}

.stat p {
  font-size: 12px;
  color: #94a3b8;
}

/* CARD */
.card {
  background: white;
  max-width: 480px;
  margin: auto;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.06);
}

.card h2 {
  margin-bottom: 5px;
}

.card p {
  font-size: 14px;
  color: #64748b;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  margin-bottom: 15px;
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: #3b82f6;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

/* RESULT */
.result {
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  display: none;
  font-size: 14px;
}

.error {
  background: #fee2e2;
  color: #b91c1c;
}

.success {
  background: #dcfce7;
  color: #15803d;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  color: #94a3b8;
}

/* MOBILE */
@media(max-width:600px){
  .hero h1 {
    font-size: 24px;
  }

  .card {
    padding: 20px;
  }
}
</style>

<div class="container">

  <div class="header">
    <div class="logo">TokenSale</div>
    <div class="badge">● Presale Live</div>
  </div>

  <div class="hero">
    <h1>Join the Token Presale</h1>
    <p>Secure your allocation before public sale</p>

    <div class="stats">
      <div class="stat">
        <h3>$2.4M</h3>
        <p>Raised</p>
      </div>
      <div class="stat">
        <h3>8,312</h3>
        <p>Users</p>
      </div>
      <div class="stat">
        <h3>62%</h3>
        <p>Filled</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Check Eligibility</h2>
    <p>Enter wallet address</p>

    <input id="wallet" placeholder="0x0000..." />

    <button onclick="check()">Check Eligibility</button>

    <div id="result" class="result"></div>
  </div>

  <div class="footer">
    Secure • No wallet connection required
  </div>

</div>

<script>
function check(){
  const val = document.getElementById('wallet').value.trim();
  const res = document.getElementById('result');

  res.style.display = "block";

  if(!val){
    res.className = "result error";
    res.innerHTML = "⚠️ Enter wallet address";
    return;
  }

  res.className = "result error";
  res.innerHTML = "❌ Not eligible (demo)";
}
</script>
