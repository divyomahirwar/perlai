<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PerlsLabs.ai - Airdrop Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f0f4ff, #ffffff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
      text-align: center;
    }

    .brand {
      font-size: 20px;
      font-weight: 600;
      color: #4f46e5;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      margin-bottom: 15px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    .result {
      margin-top: 20px;
      font-weight: 600;
      color: #e11d48;
      display: none;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }

  </style>
</head>

<body>

  <div class="card">
    <div class="brand">PerlsLabs.ai</div>
    <h1>Check Eligibility & Join Pre Sale</h1>

    <input type="text" id="wallet" placeholder="Paste your wallet address">

    <button onclick="checkEligibility()">Check Eligibility</button>

    <div class="result" id="result">
      ❌ Not Eligible
    </div>

    <div class="footer">
      Powered by PerlsLabs Protocol
    </div>
  </div>

  <script>
    function checkEligibility() {
      let wallet = document.getElementById("wallet").value;
      let result = document.getElementById("result");

      if(wallet.trim() === "") {
        alert("Please enter wallet address");
        return;
      }

      result.style.display = "block";
    }
  </script>

</body>
</html>
